name: Windows RDP Server

on:
  workflow_dispatch:

concurrency:
  group: rdp-session
  cancel-in-progress: false

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Core RDP Settings
        shell: pwsh
        run: .github/workflows/scripts/win-configure-rdp.ps1

      - name: Create RDP User
        shell: pwsh
        env:
          RDP_PASSWORD: ${{ secrets.RDP_PASSWORD }}
        run: .github/workflows/scripts/win-create-user.ps1

      # ---- 关键修复：通过 env 传入变量 ----
      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}
          tags: tag:ci
          hostname: ${{ vars.RDP_HOSTNAME }}   # 确保这里使用 vars

      - name: Retrieve Tailscale Info
        shell: pwsh
        env:
          RDP_HOSTNAME: ${{ vars.RDP_HOSTNAME }}   # 显式传入环境变量
        run: |
          # 从环境变量读取，避免展开问题
          $fixedHostname = $env:RDP_HOSTNAME
          Write-Host "DEBUG: RDP_HOSTNAME from env = '$fixedHostname'"
          
          if ([string]::IsNullOrEmpty($fixedHostname)) {
            Write-Host "WARNING: RDP_HOSTNAME is empty. Falling back to dynamic hostname."
            $fixedHostname = "gh-runner-$env:GITHUB_RUN_ID"
          }
          
          $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
          if (-not $tsIP) { throw "Tailscale IP not assigned." }
          
          $status = & "$env:ProgramFiles\Tailscale\tailscale.exe" status
          $tailnet = ($status | Select-String "tailnet").ToString().Split()[-1]
          if (-not $tailnet) {
            Write-Host "ERROR: Could not parse tailnet. Using fallback."
            $tailnet = "your-tailnet.ts.net"   # 替换为你实际的 tailnet
          }
          
          $fullFQDN = "$fixedHostname.$tailnet"
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV
          echo "TAILSCALE_HOSTNAME=$fullFQDN" >> $env:GITHUB_ENV
          Write-Host "Tailscale IP: $tsIP"
          Write-Host "MagicDNS Address: $fullFQDN"

      - name: Verify RDP Accessibility
        shell: pwsh
        run: .github/workflows/scripts/win-verify-rdp.ps1

      - name: Maintain Connection
        shell: pwsh
        run: |
          Write-Host "`n=== RDP ACCESS ==="
          Write-Host "MagicDNS Address: $env:TAILSCALE_HOSTNAME"
          Write-Host "IP Fallback: $env:TAILSCALE_IP"
          Write-Host "Username: vum"
          Write-Host "Password: (configured via GitHub Secret, not displayed)"
          Write-Host "=========================`n"
          while ($true) {
            Write-Host "[$(Get-Date)] RDP Active - Use Ctrl+C in workflow to terminate"
            Start-Sleep -Seconds 300
          }
