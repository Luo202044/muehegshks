name: Windows RDP Server

on:
  workflow_dispatch:

concurrency:
  group: rdp-session
  cancel-in-progress: false

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:
      - uses: actions/checkout@v4

      - name: Configure Core RDP Settings
        shell: pwsh
        run: .github/workflows/scripts/win-configure-rdp.ps1

      - name: Create RDP User
        shell: pwsh
        env:
          RDP_PASSWORD: ${{ secrets.RDP_PASSWORD }}
        run: .github/workflows/scripts/win-create-user.ps1

      - name: Debug - show hostname variable
        run: echo "RDP_HOSTNAME is ${{ vars.RDP_HOSTNAME }}"

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}
          tags: tag:ci
          hostname: ${{ vars.RDP_HOSTNAME }}

      - name: Retrieve Tailscale Info
        shell: pwsh
        run: |
          $fixedHostname = "${{ vars.RDP_HOSTNAME }}"
          if (-not $fixedHostname) { throw "RDP_HOSTNAME not set" }
          
          $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
          if (-not $tsIP) { throw "No IP" }
          
          $tailnet = (& "$env:ProgramFiles\Tailscale\tailscale.exe" status | Select-String "tailnet").ToString().Split()[-1]
          if (-not $tailnet) { $tailnet = "your-tailnet.ts.net" }  # 替换为你实际的 tailnet
          
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV
          echo "TAILSCALE_HOSTNAME=$fixedHostname.$tailnet" >> $env:GITHUB_ENV
          Write-Host "IP: $tsIP"
          Write-Host "FQDN: $fixedHostname.$tailnet"

      - name: Verify RDP
        shell: pwsh
        run: .github/workflows/scripts/win-verify-rdp.ps1

      - name: Maintain Connection
        shell: pwsh
        run: |
          Write-Host "`n=== RDP ACCESS ==="
          Write-Host "MagicDNS: $env:TAILSCALE_HOSTNAME"
          Write-Host "IP: $env:TAILSCALE_IP"
          Write-Host "User: vum"
          Write-Host "Password: (use Secret RDP_PASSWORD)"
          Write-Host "========================="
          while ($true) {
            Write-Host "[$(Get-Date)] RDP Active"
            Start-Sleep -Seconds 300
          }
