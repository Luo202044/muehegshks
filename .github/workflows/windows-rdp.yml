name: Windows RDP Server

on:
  workflow_dispatch:

# 可选：防止并发冲突（同一时间只允许一个运行实例）
concurrency:
  group: rdp-session
  cancel-in-progress: false

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Core RDP Settings
        shell: pwsh
        run: .github/workflows/scripts/win-configure-rdp.ps1

      - name: Create RDP User with Secure Password
        shell: pwsh
        env:
          RDP_PASSWORD: ${{ secrets.RDP_PASSWORD }}
        run: .github/workflows/scripts/win-create-user.ps1

      - name: Install Tailscale
        shell: pwsh
        run: .github/workflows/scripts/win-install-tailscale.ps1

      - name: Establish Tailscale Connection
        shell: pwsh
        env:
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
          RDP_HOSTNAME: ${{ secrets.RDP_HOSTNAME }}    # 固定的主机名（不含域名后缀）
        run: .github/workflows/scripts/win-establish-ts.ps1

      - name: Verify RDP Accessibility
        shell: pwsh
        run: .github/workflows/scripts/win-verify-rdp.ps1

      - name: Maintain Connection
        shell: pwsh
        run: |
          Write-Host "`n=== RDP ACCESS ==="
          Write-Host "MagicDNS Address: $env:TAILSCALE_HOSTNAME"
          Write-Host "IP Fallback: $env:TAILSCALE_IP"
          Write-Host "Username: vum"
          Write-Host "Password: (configured via GitHub Secret, not displayed here)"
          Write-Host "=========================`n"
          while ($true) {
            Write-Host "[$(Get-Date)] RDP Active - Use Ctrl+C in workflow to terminate"
            Start-Sleep -Seconds 300
          }
