name: Windows RDP Server

on:
  workflow_dispatch:

concurrency:
  group: rdp-session
  cancel-in-progress: false

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Core RDP Settings
        shell: pwsh
        run: .github/workflows/scripts/win-configure-rdp.ps1

      - name: Create RDP User
        shell: pwsh
        env:
          RDP_PASSWORD: ${{ secrets.RDP_PASSWORD }}
        run: .github/workflows/scripts/win-create-user.ps1

      - name: Debug hostname variable
        run: |
          echo "RDP_HOSTNAME from vars: '${{ vars.RDP_HOSTNAME }}'"
          echo "TAILNET_NAME from vars: '${{ vars.TAILNET_NAME }}'"

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}
          tags: tag:ci
          hostname: ${{ vars.RDP_HOSTNAME }}

      - name: Retrieve Tailscale Info
        shell: pwsh
        env:
          RDP_HOSTNAME_VAR: ${{ vars.RDP_HOSTNAME }}
          TAILNET_NAME_VAR: ${{ vars.TAILNET_NAME }}
        run: |
          $fixedHostname = $env:RDP_HOSTNAME_VAR
          if (-not $fixedHostname) {
            Write-Host "WARNING: RDP_HOSTNAME not set, using dynamic fallback."
            $fixedHostname = "gh-runner-$env:GITHUB_RUN_ID"
          }
          
          $tailnet = $env:TAILNET_NAME_VAR
          if (-not $tailnet) {
            Write-Host "WARNING: TAILNET_NAME not set, attempting to parse from status."
            $status = & "$env:ProgramFiles\Tailscale\tailscale.exe" status
            # 尝试从状态中提取 tailnet（常见格式：第一行包含 "tailnet" 或域名）
            $lines = $status -split "`n"
            foreach ($line in $lines) {
              if ($line -match "tailnet") {
                $tailnet = ($line -split "\s+")[-1]
                break
              }
            }
            if (-not $tailnet) {
              # 如果还没有，尝试从 "Logged out" 等消息中提取？或者硬编码默认
              Write-Host "ERROR: Could not extract tailnet. Please set TAILNET_NAME variable."
              throw "Tailnet name could not be determined."
            }
          }
          
          $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
          if (-not $tsIP) { throw "No Tailscale IP assigned." }
          
          $fullFQDN = "$fixedHostname.$tailnet"
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV
          echo "TAILSCALE_HOSTNAME=$fullFQDN" >> $env:GITHUB_ENV
          Write-Host "Tailscale IP: $tsIP"
          Write-Host "MagicDNS Address: $fullFQDN"

      - name: Verify RDP Accessibility
        shell: pwsh
        run: .github/workflows/scripts/win-verify-rdp.ps1

      - name: Maintain Connection
        shell: pwsh
        run: |
          Write-Host "`n=== RDP ACCESS ==="
          Write-Host "MagicDNS Address: $env:TAILSCALE_HOSTNAME"
          Write-Host "IP Fallback: $env:TAILSCALE_IP"
          Write-Host "Username: vum"
          Write-Host "Password: (configured via GitHub Secret, not displayed)"
          Write-Host "=========================`n"
          while ($true) {
            Write-Host "[$(Get-Date)] RDP Active"
            Start-Sleep -Seconds 300
          }
